name: Transcribe meeting

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID (leave blank for all pending)'
        required: false
        default: ''

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: scripts/transcription

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run transcription
        run: |
          if [ -n "${{ github.event.inputs.event_id }}" ]; then
            python transcribe.py --event-id ${{ github.event.inputs.event_id }}
          else
            python transcribe.py
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
