name: Generate NotebookLM source

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID (leave blank to generate all missing)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scripts/transcription

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate NotebookLM source
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.event_id }}" ]; then
            ARGS="--event-id ${{ github.event.inputs.event_id }}"
          fi
          python generate_notebooklm_source.py $ARGS
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
